<!DOCTYPE html>
<html lang="{{ 'zh-Hant' if lang == 'zh' else 'en' }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ t('title') }}</title>
<style>
  :root {
    --bg: #0c0d10; --panel: #15161b; --panel-2: #1b1d24; --line: #262833;
    --ink: #e9eaf0; --ink-soft: #9a9db0; --ink-dim: #5f6275; --accent: #6f7bff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1000px 520px at 78% -12%, #181a2b 0%, transparent 58%),
      radial-gradient(820px 440px at -8% 6%, #14171f 0%, transparent 52%),
      var(--bg);
    color: var(--ink);
    font-family: "Inter", "PingFang TC", "Noto Sans TC", -apple-system, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  a { color: inherit; text-decoration: none; }
  .card {
    width: 100%; max-width: 360px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 16px; padding: 30px 28px 26px;
  }
  .mark { display: flex; align-items: center; gap: 9px; margin-bottom: 22px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--accent); }
  .mark b { font-weight: 600; font-size: 14.5px; letter-spacing: .2px; }
  h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .sub { color: var(--ink-dim); font-size: 12.5px; margin-bottom: 22px; }
  label { display: block; font-size: 11.5px; color: var(--ink-soft); margin: 14px 0 6px; }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 10px;
    color: var(--ink); font-size: 14px; padding: 11px 12px; outline: none; transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%; margin-top: 22px; background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: filter .15s;
  }
  button:hover { filter: brightness(1.08); }
  .err { color: #ff6b6b; font-size: 12px; margin-top: 14px; }
  .lang { display: flex; gap: 6px; justify-content: center; margin-top: 20px; font-size: 12px; color: var(--ink-dim); }
  .lang a { padding: 2px 7px; border-radius: 6px; }
  .lang a.on { color: var(--ink); background: var(--panel-2); }
</style>
</head>
<body>
  <form class="card" method="POST" action="/login?next={{ next | urlencode }}">
    <div class="mark"><span class="dot"></span><b>{{ t('title') }}</b></div>
    <h1>{{ t('login_h') }}</h1>
    <div class="sub">{{ t('subtitle') }}</div>

    <input type="hidden" name="next" value="{{ next }}">
    <label for="username">{{ t('user') }}</label>
    <input id="username" name="username" autocomplete="username" autofocus>
    <label for="password">{{ t('pass') }}</label>
    <input id="password" name="password" type="password" autocomplete="current-password">

    <button type="submit">{{ t('login_btn') }}</button>
    {% if error %}<div class="err">{{ t('login_err') }}</div>{% endif %}

    <div class="lang">
      <a href="/lang/en?next=/login" class="{{ 'on' if lang == 'en' else '' }}">EN</a>
      <a href="/lang/zh?next=/login" class="{{ 'on' if lang == 'zh' else '' }}">中文</a>
    </div>
  </form>
</body>
</html>
