<!DOCTYPE html>
<html lang="{{ 'zh-Hant' if lang == 'zh' else 'en' }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ t('title') }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f; --panel: rgba(22,24,31,0.78); --line: rgba(255,255,255,0.08); --line-hi: rgba(255,255,255,0.18);
    --ink: #ecedf2; --ink-soft: #a6a9b8; --ink-dim: #6a6e80; --gold: #c8a86a; --gold-soft: #d8c199;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1000px 560px at 80% -16%, rgba(124,131,255,0.10) 0%, transparent 58%),
      radial-gradient(820px 480px at -8% 4%, rgba(200,168,106,0.08) 0%, transparent 52%),
      var(--bg);
    color: var(--ink); font-family: "Inter", "PingFang TC", "Noto Sans TC", -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(700px 520px at 50% 42%, #000 0%, transparent 78%);
    -webkit-mask-image: radial-gradient(700px 520px at 50% 42%, #000 0%, transparent 78%);
  }
  a { color: inherit; text-decoration: none; }
  .card {
    position: relative; z-index: 1; width: 100%; max-width: 372px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: 34px 30px 28px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 24px 60px -28px rgba(0,0,0,0.8);
  }
  .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px; border-radius: 20px 20px 0 0;
    background: linear-gradient(90deg, transparent, rgba(200,168,106,0.55), transparent); }
  .mark { display: flex; align-items: center; gap: 11px; margin-bottom: 26px; }
  .gem { width: 18px; height: 18px; transform: rotate(45deg); border: 1px solid var(--gold); border-radius: 4px; position: relative; box-shadow: 0 0 16px rgba(200,168,106,0.25); }
  .gem::after { content: ""; position: absolute; inset: 4px; background: var(--gold); border-radius: 2px; opacity: .85; }
  .mark b { font-weight: 500; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--ink-soft); }
  h1 { font-family: "Noto Serif TC", "Songti TC", serif; font-size: 21px; font-weight: 600; letter-spacing: .5px; line-height: 1.35; }
  .sub { color: var(--ink-dim); font-size: 12px; margin-top: 7px; letter-spacing: 1px; text-transform: uppercase; }
  label { display: block; font-size: 11px; color: var(--ink-soft); letter-spacing: .6px; margin: 16px 0 7px; }
  input {
    width: 100%; background: rgba(0,0,0,0.25); border: 1px solid var(--line); border-radius: 11px;
    color: var(--ink); font-size: 14px; padding: 12px 13px; outline: none; transition: border-color .15s, background .15s;
  }
  input:focus { border-color: var(--gold); background: rgba(0,0,0,0.35); }
  button {
    width: 100%; margin-top: 24px; border: 1px solid rgba(200,168,106,0.45); cursor: pointer;
    background: linear-gradient(180deg, rgba(200,168,106,0.22), rgba(200,168,106,0.10));
    color: var(--gold-soft); border-radius: 11px; padding: 12px; font-size: 13.5px; font-weight: 600; letter-spacing: 1.5px;
    transition: background .15s, border-color .15s, color .15s;
  }
  button:hover { background: linear-gradient(180deg, rgba(200,168,106,0.34), rgba(200,168,106,0.16)); border-color: var(--gold); color: #fff; }
  .err { color: #ff7a7a; font-size: 12px; margin-top: 15px; }
  .lang { display: flex; gap: 4px; justify-content: center; margin-top: 24px; font-size: 12px; }
  .lang a { padding: 3px 9px; border-radius: 7px; color: var(--ink-dim); letter-spacing: .5px; }
  .lang a.on { color: var(--ink); background: rgba(255,255,255,0.06); }
  .lang a:hover { color: var(--ink-soft); }
</style>
</head>
<body>
  <form class="card" method="POST" action="/login?next={{ next | urlencode }}">
    <div class="mark"><span class="gem"></span><b>{{ t('brand') }}</b></div>
    <h1>{{ t('title') }}</h1>
    <div class="sub">{{ t('login_sub') }}</div>

    <input type="hidden" name="next" value="{{ next }}">
    <label for="username">{{ t('user') }}</label>
    <input id="username" name="username" autocomplete="username" autofocus>
    <label for="password">{{ t('pass') }}</label>
    <input id="password" name="password" type="password" autocomplete="current-password">

    <button type="submit">{{ t('login_btn') }}</button>
    {% if error %}<div class="err">{{ t('login_err') }}</div>{% endif %}

    <div class="lang">
      <a href="/lang/en?next=/login" class="{{ 'on' if lang == 'en' else '' }}">EN</a>
      <a href="/lang/zh?next=/login" class="{{ 'on' if lang == 'zh' else '' }}">中文</a>
    </div>
  </form>
</body>
</html>
