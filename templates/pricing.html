<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pricing Power Radar · 議價能力雷達</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0f; --panel:rgba(22,24,31,.72); --panel-hi:rgba(30,33,42,.9);
    --line:rgba(255,255,255,.08); --line-hi:rgba(255,255,255,.16);
    --ink:#ecedf2; --soft:#a6a9b8; --dim:#6a6e80; --gold:#c8a86a; --acc:#7c83ff;
    --on:#43c08a; --off:#e0626e; --neu:#c8a86a; --warn:#e0a14a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1100px 560px at 82% -14%,rgba(124,131,255,.10),transparent 58%),radial-gradient(900px 520px at -8% 4%,rgba(200,168,106,.08),transparent 52%),var(--bg);
       color:var(--ink);font-family:"Inter","PingFang TC","Noto Sans TC",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 26px 60px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:11px}
  .gem{width:16px;height:16px;transform:rotate(45deg);border:1px solid var(--gold);border-radius:4px;position:relative}
  .gem::after{content:"";position:absolute;inset:4px;background:var(--gold);border-radius:2px;opacity:.85}
  h1{font-family:"Noto Serif TC",serif;font-weight:600;font-size:22px;letter-spacing:.5px}
  .tools{display:flex;align-items:center;gap:10px}
  .btn{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--line-hi);background:transparent;color:var(--soft);cursor:pointer;transition:.15s}
  .btn:hover{color:var(--ink);border-color:var(--acc)}
  .btn.go{border-color:var(--acc);color:var(--acc)}
  .status{font-size:11.5px;color:var(--dim)}
  .crumb{font-size:11px;color:var(--dim);letter-spacing:.4px;margin-bottom:18px}
  .crumb a:hover{color:var(--gold)}
  .demo{background:rgba(200,168,106,.10);border:1px solid rgba(200,168,106,.3);color:var(--gold);
        font-size:12px;padding:9px 13px;border-radius:10px;margin-bottom:18px}
  .sub{color:var(--dim);font-size:12.5px;line-height:1.6;margin-bottom:22px}

  .grid{display:grid;gap:16px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
  .panel h2{font-family:"Noto Serif TC",serif;font-size:15px;font-weight:600;letter-spacing:.5px;margin-bottom:4px}
  .panel .note{font-size:11.5px;color:var(--dim);margin-bottom:14px;line-height:1.5}
  .eyebrow{font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);opacity:.85}

  /* hero */
  .hero{display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:16px;margin-bottom:16px}
  @media(max-width:780px){.hero{grid-template-columns:1fr}}
  .big{font-variant-numeric:tabular-nums;font-weight:600;font-size:30px;letter-spacing:.5px}
  .gauge{height:8px;border-radius:999px;background:linear-gradient(90deg,var(--off),var(--neu),var(--on));position:relative;margin:14px 0 8px}
  .gauge .pin{position:absolute;top:-4px;width:3px;height:16px;background:#fff;border-radius:2px;box-shadow:0 0 8px rgba(255,255,255,.6)}
  .scale{display:flex;justify-content:space-between;font-size:10px;color:var(--dim)}
  .tag{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:999px;letter-spacing:.4px}
  .tag.on{background:rgba(67,192,138,.15);color:var(--on)} .tag.off{background:rgba(224,98,110,.15);color:var(--off)}
  .tag.neutral{background:rgba(200,168,106,.15);color:var(--neu)}
  .kv{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-top:1px solid var(--line)}
  .kv .k{color:var(--soft)} .kv .v{font-variant-numeric:tabular-nums;font-weight:600}

  /* price-stack waterfall */
  .stack{display:flex;flex-direction:column;gap:0}
  .layerbar{position:relative;background:var(--panel-hi);border:1px solid var(--line);border-radius:12px;padding:13px 16px}
  .lbhead{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .lbname{font-weight:600;font-size:14px}
  .lbrole{font-size:11px;color:var(--soft);line-height:1.45;margin-top:5px;max-width:78%}
  .lbmom{font-variant-numeric:tabular-nums;font-size:22px;font-weight:600;white-space:nowrap}
  .passthru{display:flex;align-items:center;justify-content:center;gap:8px;font-size:11.5px;color:var(--gold);
            padding:7px 0}
  .passthru .pt{font-variant-numeric:tabular-nums;font-weight:600;color:var(--ink)}
  .passthru .ar{color:var(--gold);font-size:14px}

  /* layer detail tables */
  .layerblock{margin-top:6px}
  .lh{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:14px 0 6px}
  .lh .nm{font-weight:600;font-size:13.5px}
  .lh .mm{font-variant-numeric:tabular-nums;font-size:12px;color:var(--soft)}
  table.it{width:100%;border-collapse:collapse;font-size:12.5px}
  table.it td{padding:7px 6px;border-top:1px solid var(--line);vertical-align:top}
  table.it td.nm{color:var(--ink)}
  table.it td.val{font-variant-numeric:tabular-nums;color:var(--soft);text-align:right;white-space:nowrap}
  table.it td.chg{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
  .chg.up{color:var(--on)} .chg.down{color:var(--off)} .chg.flat{color:var(--dim)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:7px}
  .dot.on{background:var(--on)} .dot.off{background:var(--off)} .dot.neutral{background:var(--neu)}
  .badge{font-size:9px;letter-spacing:.4px;border:1px solid var(--line-hi);border-radius:4px;padding:0 4px;color:var(--dim);margin-left:6px}
  .badge.t1{color:var(--on);border-color:rgba(67,192,138,.4)}
  .badge.t2{color:var(--gold);border-color:rgba(200,168,106,.4)}
  .badge.t3{color:var(--off);border-color:rgba(224,98,110,.4)}
  .badge.est{color:var(--warn);border-color:rgba(224,161,74,.4)}
  .badge.live{color:var(--acc);border-color:rgba(124,131,255,.4)}
  .badge.eq{color:var(--dim);border-color:rgba(124,131,255,.25);font-style:italic}
  .badge.calib{color:var(--warn);border-color:rgba(224,161,74,.45)}
  .src{font-size:10.5px;color:var(--dim);margin-top:3px}
  .src a:hover{color:var(--gold)}

  /* alerts */
  .alert{border-radius:11px;padding:11px 14px;font-size:12.5px;line-height:1.55;margin-bottom:9px;border:1px solid var(--line)}
  .alert .lv{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:4px;display:block}
  .alert.squeeze{background:rgba(224,98,110,.08);border-color:rgba(224,98,110,.32)} .alert.squeeze .lv{color:var(--off)}
  .alert.opportunity{background:rgba(67,192,138,.08);border-color:rgba(67,192,138,.32)} .alert.opportunity .lv{color:var(--on)}
  .alert.strong{background:rgba(67,192,138,.08);border-color:rgba(67,192,138,.32)} .alert.strong .lv{color:var(--on)}
  .alert.watch{background:rgba(224,161,74,.07);border-color:rgba(224,161,74,.28)} .alert.watch .lv{color:var(--warn)}

  /* L4 / L5 */
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:780px){.two{grid-template-columns:1fr}}
  .body{font-size:13px;line-height:1.7;color:var(--ink)}
  .leads li,.fals li{font-size:12.5px;line-height:1.6;color:var(--soft);margin:6px 0;list-style:none;padding-left:16px;position:relative}
  .leads li::before,.fals li::before{content:"▸";position:absolute;left:0;color:var(--gold)}
  .lyc{font-size:12.5px;line-height:1.6;color:var(--soft);padding:8px 0;border-top:1px solid var(--line)}
  .lyc b{color:var(--ink);font-weight:500}
  .scn{padding:11px 0;border-top:1px solid var(--line)}
  .scnhead{display:flex;justify-content:space-between;gap:10px;font-size:13px}
  .scnname{font-weight:500}
  .scnprob{font-variant-numeric:tabular-nums;color:var(--gold);font-weight:600}
  .bar{height:6px;border-radius:999px;background:rgba(255,255,255,.06);margin:7px 0 6px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--gold))}
  .scntrig{font-size:11.5px;color:var(--dim);line-height:1.5}
  table.ew{width:100%;border-collapse:collapse;font-size:12.5px}
  table.ew td{padding:7px 8px;border-top:1px solid var(--line)}
  table.ew td.f{text-align:right;color:var(--gold);font-size:11px;white-space:nowrap}
  .news a{display:block;font-size:12.5px;color:var(--soft);padding:7px 0;border-top:1px solid var(--line);line-height:1.4}
  .news a:hover{color:var(--ink)} .news .src2{color:var(--dim);font-size:11px}
  .foot{margin-top:24px;font-size:11px;color:var(--dim);line-height:1.7}
  .disc{background:rgba(224,161,74,.06);border:1px solid rgba(224,161,74,.22);color:var(--soft);
        font-size:11.5px;line-height:1.6;padding:11px 14px;border-radius:11px;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="gem"></span><h1 id="title"></h1></div>
    <div class="tools">
      <button class="btn" id="langBtn"></button>
      <button class="btn go" id="refreshBtn"></button>
      <span class="status" id="status"></span>
    </div>
  </div>
  <div class="crumb"><a href="/">← <span id="crumbHome"></span></a> · <span id="asof"></span> · <span id="engine"></span></div>
  <div id="demo" class="demo" style="display:none"></div>
  <div class="sub" id="method"></div>

  <!-- hero -->
  <div class="hero">
    <div class="panel">
      <span class="eyebrow" id="h_pp"></span>
      <div class="big"><span id="ppScore"></span><span style="font-size:15px;color:var(--dim)">/100</span> <span class="tag" id="ppTag"></span></div>
      <div class="gauge"><div class="pin" id="ppPin"></div></div>
      <div class="scale"><span id="sc_lo"></span><span>50</span><span id="sc_hi"></span></div>
    </div>
    <div class="panel">
      <span class="eyebrow" id="h_tr"></span>
      <div class="kv"><span class="k" id="tr_uf_l"></span><span class="v" id="tr_uf"></span></div>
      <div class="kv"><span class="k" id="tr_fd_l"></span><span class="v" id="tr_fd"></span></div>
      <div class="note" style="margin:10px 0 0" id="tr_hint"></div>
    </div>
    <div class="panel">
      <span class="eyebrow" id="h_mg"></span>
      <div class="kv"><span class="k" id="mg_f_l"></span><span class="v" id="mg_f"></span></div>
      <div class="kv"><span class="k" id="mg_c_l"></span><span class="v" id="mg_c"></span></div>
      <div class="note" style="margin:10px 0 0" id="mg_hint"></div>
    </div>
  </div>

  <div class="grid">
    <!-- price-stack waterfall -->
    <div class="panel">
      <h2 id="h_stack"></h2><div class="note" id="n_stack"></div>
      <div class="stack" id="stack"></div>
    </div>

    <!-- alerts -->
    <div class="panel">
      <h2 id="h_alerts"></h2><div class="note" id="n_alerts"></div>
      <div id="alerts"></div>
    </div>

    <!-- L4 CEO read -->
    <div class="two">
      <div class="panel">
        <h2 id="h_read"></h2>
        <div class="body" id="ppRead"></div>
        <h2 style="margin-top:16px" id="h_trread"></h2>
        <div class="body" id="trRead"></div>
      </div>
      <div class="panel">
        <h2 id="h_layers"></h2>
        <div id="layerCommentary"></div>
        <div class="note" style="margin:14px 0 6px" id="h_leads"></div>
        <ul class="leads" id="leads"></ul>
      </div>
    </div>

    <!-- per-layer detail tables -->
    <div class="panel">
      <h2 id="h_detail"></h2><div class="note" id="n_detail"></div>
      <div id="detail"></div>
    </div>

    <!-- L5 scenarios + falsification + watch -->
    <div class="two">
      <div class="panel">
        <h2 id="h_scn"></h2><div class="note" id="n_scn"></div>
        <div id="scenarios"></div>
      </div>
      <div class="panel">
        <h2 id="h_fals"></h2>
        <ul class="fals" id="falsification"></ul>
        <h2 style="margin-top:16px" id="h_watch"></h2>
        <table class="ew"><tbody id="watch"></tbody></table>
      </div>
    </div>

    <!-- news -->
    <div class="panel" id="newsPanel" style="display:none">
      <h2 id="h_news"></h2>
      <div class="news" id="news"></div>
    </div>
  </div>

  <div class="foot">
    <div class="disc" id="disclaimer"></div>
    <div id="blindHead" style="margin-top:14px"></div>
    <ul style="list-style:none;margin-top:6px" id="blind"></ul>
    <div style="margin-top:12px" id="methodFoot"></div>
  </div>
</div>

<script>
const SNAP = {{ snapshot | safe }};
let LANG = localStorage.getItem("pricing_lang") || "en";

const T = {
  en:{home:"External Market Analysis", lang:"中文", refresh:"↻ Refresh",
      pwPrompt:"Enter refresh password (default pricing2026):", refreshing:"refreshing… live proxies + Claude L4/L5",
      done:"done, reloading…", fail:"refresh failed",
      demo:"Seed/demo view — hit ↻ Refresh to pull live proxies (and Claude L4/L5 if an API key is set).",
      asof:"As of", engineRules:"engine: rules (no API key)", engineClaude:"engine: Claude Opus 4.8",
      pp:"Pricing power — can I raise prices?", scLo:"0 squeezed", scHi:"100 defensible",
      tr:"Pass-through", tr_uf:"Upstream cost → foundry ASP", tr_fd:"Foundry ASP → downstream ASP",
      trHint:">100% = expanding margin / customers raising faster than you (room to raise).",
      mg:"Margin direction (1m)", mg_f:"Foundry ASP − input cost", mg_c:"Downstream − foundry",
      mgHint:"Positive = the foundry layer is capturing, not losing, margin this month.",
      stack:"Price stack — cost → foundry → end-market", stackNote:"Each layer's weighted 1-month price move; arrows = pass-through. ● = TSMC-favorability.",
      alerts:"Divergence alerts", alertsNote:"Deterministic flags where one layer is moving out of line with the others.",
      read:"L4 · CEO read", trread:"L4 · Pass-through read",
      layers:"L4 · Per-layer", leads:"Leading signals (move before reported ASP)",
      detail:"L1/L2 · Price-stack detail", detailNote:"Every tracked price with its tier (T1 filings · T2 analyst/channel · T3 news) and live/estimate flag. Click a source.",
      scn:"L5 · Scenarios", scnNote:"Probabilities from the current read; each with a concrete trigger.",
      fals:"L5 · Falsification — what flips the verdict", watch:"L5 · Watch-list",
      news:"News radar (fetched on refresh)", blind:"Blind spots", trigger:"Trigger",
      disc:"⚠ Real per-customer wafer prices are confidential. Leading-edge & memory rows are tier-graded ESTIMATES; equity rows are directional market PROXIES, not literal transaction prices. This is external price intelligence, not TSMC's price book.",
      live:"live", est:"est", calib:"calibrate", eq:"equity",
      partialNote:s=>`⚠ Partial refresh — ${s} did not update and is showing its seed; treat the cost layer as stale until refetched.`,
      sentNote:"Equity proxies are sentiment-damped (×0.25, capped ±4%) before they touch the score. The raw stock move is shown as a separate market-sentiment reference and is NOT in the bargaining momentum/score.",
      sentLbl:"mkt sentiment (raw equity, not in score)"},
  zh:{home:"外部市場分析", lang:"EN", refresh:"↻ 更新",
      pwPrompt:"輸入更新密碼(預設 pricing2026):", refreshing:"更新中…即時代理 + Claude L4/L5",
      done:"完成,重新載入中…", fail:"更新失敗",
      demo:"種子/示範視圖 — 按 ↻ 更新 抓即時代理(若設了 API key 會跑 Claude L4/L5)。",
      asof:"資料時點", engineRules:"引擎:規則(無 API key)", engineClaude:"引擎:Claude Opus 4.8",
      pp:"議價能力 — 我現在能漲價嗎?", scLo:"0 受擠壓", scHi:"100 有定價權",
      tr:"轉嫁率", tr_uf:"上游成本 → 代工 ASP", tr_fd:"代工 ASP → 下游 ASP",
      trHint:">100% = 擴張毛利 / 客戶漲價快於你(有漲價空間)。",
      mg:"毛利方向(月)", mg_f:"代工 ASP − 投入成本", mg_c:"下游 − 代工",
      mgHint:"為正 = 本月代工這一層是在賺取毛利,而非流失。",
      stack:"價格堆疊 — 成本 → 代工 → 終端", stackNote:"各層加權後的月價格變動;箭頭 = 轉嫁率。● = 對台積電的有利度。",
      alerts:"背離警報", alertsNote:"以確定性規則標記某一層與其他層走勢脫節之處。",
      read:"L4 · CEO 判讀", trread:"L4 · 轉嫁判讀",
      layers:"L4 · 逐層", leads:"領先訊號(比報導 ASP 先動)",
      detail:"L1/L2 · 價格堆疊明細", detailNote:"每一筆追蹤價格,附證據等級(T1 財報官方 · T2 分析師/通路 · T3 新聞)與即時/估計旗標。可點來源。",
      scn:"L5 · 情境", scnNote:"機率來自當前判讀;每個情境附具體觸發條件。",
      fals:"L5 · 證偽 — 什麼會翻轉結論", watch:"L5 · 觀察清單",
      news:"新聞雷達(更新時抓取)", blind:"盲點", trigger:"觸發",
      disc:"⚠ 真實逐客戶晶圓報價屬機密。先進製程與記憶體列為分級「估計值」;股價列為方向性的市場「代理」,非字面成交價。本平台為對外價格情報,非台積電價目表。",
      live:"即時", est:"估", calib:"待校準", eq:"股價",
      partialNote:s=>`⚠ 部分更新 — ${s} 未更新,仍顯示種子值;在重新抓取前,成本層視為過期。`,
      sentNote:"股價代理在進入分數前已做情緒衰減(×0.25,上限 ±4%)。原始股價變動另列為市場情緒參考,不計入議價動能/分數。",
      sentLbl:"市場情緒(原始股價,不計入分數)"}
};

function L(o,base){ return (o && (o[base+"_"+LANG] ?? o[base+"_en"])) || ""; }
function fmtPct(v){ if(v===null||v===undefined) return "—"; return (v>0?"+":"")+v+"%"; }
function fmtVal(v,unit){
  if(v===null||v===undefined) return "—";
  if(unit==="$"||unit==="$/lb"||unit==="$/wfr"){ const n = v>=1000? v.toLocaleString(undefined,{maximumFractionDigits:0}) : v; return "$"+n; }
  if(unit==="idx") return v+" idx";
  return v + (unit?(" "+unit):"");
}
function chgClass(v){ if(v===null||v===undefined||Math.abs(v)<0.01) return "flat"; return v>0?"up":"down"; }
function fmtPT(v){ return (v===null||v===undefined)? "n/a" : v+"%"; }

function render(){
  const t=T[LANG], s=SNAP;
  document.documentElement.lang = LANG==="zh"?"zh-Hant":"en";
  document.getElementById("title").textContent = LANG==="zh"? s.title_zh : s.title_en;
  document.getElementById("langBtn").textContent = t.lang;
  document.getElementById("refreshBtn").textContent = t.refresh;
  document.getElementById("crumbHome").textContent = t.home;
  document.getElementById("asof").textContent = t.asof + " " + (s.as_of||"") + (s.generated_at? " · "+s.generated_at : "");
  document.getElementById("engine").textContent = s.analysis_engine==="claude"? t.engineClaude : t.engineRules;
  document.getElementById("method").textContent = LANG==="zh"? s.method_zh : s.method_en;
  const demo=document.getElementById("demo");
  if(s.is_demo){ demo.style.display="block"; demo.textContent=t.demo; }
  else if(s.source==="partial" && (s.stale_fetch_ids||[]).length){
    demo.style.display="block"; demo.textContent=t.partialNote(s.stale_fetch_ids.join(", "));
  } else { demo.style.display="none"; }

  const l3=s.l3, pp=s.pricing_power, tr=l3.transmission, mg=l3.margin;

  // hero — pricing power
  document.getElementById("h_pp").textContent=t.pp;
  document.getElementById("ppScore").textContent=pp.score;
  const ppTag=document.getElementById("ppTag");
  ppTag.textContent=LANG==="zh"?pp.verdict_zh:pp.verdict_en;
  ppTag.className="tag "+(pp.verdict_key==="defensible"?"on":pp.verdict_key==="squeezed"?"off":"neutral");
  document.getElementById("ppPin").style.left=pp.score+"%";
  document.getElementById("sc_lo").textContent=t.scLo;
  document.getElementById("sc_hi").textContent=t.scHi;

  // hero — transmission
  document.getElementById("h_tr").textContent=t.tr;
  document.getElementById("tr_uf_l").textContent=t.tr_uf;
  document.getElementById("tr_fd_l").textContent=t.tr_fd;
  document.getElementById("tr_uf").textContent=fmtPT(tr.up_to_fab);
  document.getElementById("tr_fd").textContent=fmtPT(tr.fab_to_down);
  document.getElementById("tr_hint").textContent=t.trHint;

  // hero — margin
  document.getElementById("h_mg").textContent=t.mg;
  document.getElementById("mg_f_l").textContent=t.mg_f;
  document.getElementById("mg_c_l").textContent=t.mg_c;
  const mgf=document.getElementById("mg_f"), mgc=document.getElementById("mg_c");
  mgf.textContent=(mg.fab_delta>0?"+":"")+mg.fab_delta; mgf.style.color=mg.fab_delta>=0?"var(--on)":"var(--off)";
  mgc.textContent=(mg.chain_delta>0?"+":"")+mg.chain_delta; mgc.style.color=mg.chain_delta>=0?"var(--on)":"var(--off)";
  document.getElementById("mg_hint").textContent=t.mgHint;

  // price-stack waterfall
  document.getElementById("h_stack").textContent=t.stack;
  document.getElementById("n_stack").textContent=t.stackNote;
  const layers=l3.layers, stackEl=document.getElementById("stack");
  let html="";
  layers.forEach((ly,i)=>{
    const sent=(ly.market_sentiment!==null&&ly.market_sentiment!==undefined)
      ? `<div class="lbrole" style="opacity:.8" title="${t.sentNote}">${t.sentLbl}: ${fmtPct(ly.market_sentiment)}</div>` : "";
    html+=`<div class="layerbar">
      <div class="lbhead">
        <div><div class="lbname">${LANG==="zh"?ly.name_zh:ly.name_en} <span class="dot ${ly.signal}"></span></div>
        <div class="lbrole">${LANG==="zh"?ly.role_zh:ly.role_en}</div>${sent}</div>
        <div class="lbmom chg ${chgClass(ly.momentum)}">${fmtPct(ly.momentum)}</div>
      </div></div>`;
    if(i===0) html+=`<div class="passthru"><span class="ar">↓</span> <span>${t.tr_uf}</span> <span class="pt">${fmtPT(tr.up_to_fab)}</span></div>`;
    if(i===1) html+=`<div class="passthru"><span class="ar">↓</span> <span>${t.tr_fd}</span> <span class="pt">${fmtPT(tr.fab_to_down)}</span></div>`;
  });
  stackEl.innerHTML=html;

  // alerts
  document.getElementById("h_alerts").textContent=t.alerts;
  document.getElementById("n_alerts").textContent=t.alertsNote;
  document.getElementById("alerts").innerHTML=l3.alerts.map(a=>`
    <div class="alert ${a.level}"><span class="lv">${a.level}</span>${LANG==="zh"?a.zh:a.en}</div>`).join("");

  // L4
  const l4=s.l4;
  document.getElementById("h_read").textContent=t.read;
  document.getElementById("ppRead").textContent=LANG==="zh"?l4.pricing_power_read.zh:l4.pricing_power_read.en;
  document.getElementById("h_trread").textContent=t.trread;
  document.getElementById("trRead").textContent=LANG==="zh"?l4.transmission_read.zh:l4.transmission_read.en;
  document.getElementById("h_layers").textContent=t.layers;
  const ly4=l4.layers, lyNames={upstream:LANG==="zh"?"上游":"Upstream",foundry:LANG==="zh"?"代工":"Foundry",downstream:LANG==="zh"?"下游":"Downstream"};
  document.getElementById("layerCommentary").innerHTML=["upstream","foundry","downstream"].map(k=>
    `<div class="lyc"><b>${lyNames[k]} ·</b> ${LANG==="zh"?ly4[k].zh:ly4[k].en}</div>`).join("");
  document.getElementById("h_leads").textContent=t.leads;
  document.getElementById("leads").innerHTML=l4.leading_signals.map(x=>`<li>${LANG==="zh"?x.zh:x.en}</li>`).join("");

  // per-layer detail tables
  document.getElementById("h_detail").textContent=t.detail;
  document.getElementById("n_detail").textContent=t.detailNote;
  document.getElementById("detail").innerHTML=layers.map(ly=>{
    const rows=ly.items.map(it=>{
      const tier=(it.tier||"").toLowerCase();
      const badges=`<span class="badge ${tier}">${it.tier}</span>`
        + (it.is_estimate?`<span class="badge est">${t.est}</span>`:"")
        + (it.momentum_kind==="equity"?`<span class="badge eq" title="${t.sentNote}">${t.eq}</span>`:"")
        + (it.needs_calibration?`<span class="badge calib">⚑ ${t.calib}</span>`:"")
        + (it.live?`<span class="badge live">${t.live}${it.freq?(" · "+it.freq):""}</span>`:"");
      const fn=LANG==="zh"?it.freshness_note_zh:it.freshness_note_en;
      const src=it.source_url
        ? `<div class="src"><a href="${it.source_url}" target="_blank" rel="noopener">${LANG==="zh"?it.source_zh:it.source_en} ↗</a></div>`
        : `<div class="src">${LANG==="zh"?it.source_zh:it.source_en}</div>`;
      const fnEl=fn?`<div class="src" style="color:var(--gold)">${fn}</div>`:"";
      // equity rows: show the raw move + the damped value that actually hit the score
      const dampNote=(it.momentum_kind==="equity"&&it.score_chg_1m!==undefined&&it.score_chg_1m!==null&&it.score_chg_1m!==it.chg_1m)
        ? `<span class="src2" title="${t.sentNote}"> → ${fmtPct(it.score_chg_1m)} in score</span>` : "";
      return `<tr>
        <td class="nm">${LANG==="zh"?it.name_zh:it.name_en}${badges}${src}${fnEl}</td>
        <td class="val">${fmtVal(it.value,it.unit)}</td>
        <td class="chg ${chgClass(it.chg_1m)}">${fmtPct(it.chg_1m)}${dampNote}<span class="dot ${it.signal}"></span></td>
      </tr>`;
    }).join("");
    return `<div class="layerblock">
      <div class="lh"><span class="nm">${LANG==="zh"?ly.name_zh:ly.name_en}</span><span class="mm">1m ${fmtPct(ly.momentum)}</span></div>
      <table class="it"><tbody>${rows}</tbody></table>
    </div>`;
  }).join("");

  // L5
  const l5=s.l5;
  document.getElementById("h_scn").textContent=t.scn;
  document.getElementById("n_scn").textContent=t.scnNote;
  document.getElementById("scenarios").innerHTML=l5.scenarios.map(sc=>`
    <div class="scn">
      <div class="scnhead"><span class="scnname">${LANG==="zh"?sc.name_zh:sc.name_en}</span><span class="scnprob">${sc.prob}%</span></div>
      <div class="bar"><i style="width:${sc.prob}%"></i></div>
      <div class="scntrig">${t.trigger}: ${LANG==="zh"?sc.trigger_zh:sc.trigger_en}</div>
    </div>`).join("");
  document.getElementById("h_fals").textContent=t.fals;
  document.getElementById("falsification").innerHTML=l5.falsification.map(x=>`<li>${LANG==="zh"?x.zh:x.en}</li>`).join("");
  document.getElementById("h_watch").textContent=t.watch;
  document.getElementById("watch").innerHTML=l5.watch.map(x=>`<tr><td>${LANG==="zh"?x.zh:x.en}</td><td class="f">${x.freq}</td></tr>`).join("");

  // news
  if(s.news && s.news.length){
    document.getElementById("newsPanel").style.display="block";
    document.getElementById("h_news").textContent=t.news;
    document.getElementById("news").innerHTML=s.news.slice(0,12).map(n=>`<a href="${n.url}" target="_blank" rel="noopener">${n.title} <span class="src2">${n.source?("· "+n.source):""} ${n.date||""}</span></a>`).join("");
  }

  // disclaimer + blind spots + method
  document.getElementById("disclaimer").textContent=t.disc;
  document.getElementById("blindHead").textContent=t.blind+":";
  const blind=LANG==="zh"?s.blind_spots_zh:s.blind_spots_en;
  document.getElementById("blind").innerHTML=(blind||[]).map(b=>`<li>· ${b}</li>`).join("");
  document.getElementById("methodFoot").textContent=LANG==="zh"?s.method_zh:s.method_en;
}

document.getElementById("langBtn").addEventListener("click",()=>{
  LANG=LANG==="zh"?"en":"zh"; localStorage.setItem("pricing_lang",LANG); render();
});
async function doRefresh(){
  const t=T[LANG];
  const pw=prompt(t.pwPrompt); if(!pw) return;
  const st=document.getElementById("status"); st.textContent=t.refreshing;
  try{
    const r=await fetch("/pricing/api/refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
    const j=await r.json();
    if(!r.ok||!j.ok){ st.textContent=t.fail+(j.error?` (${j.error})`:""); return; }
    st.textContent=`${t.done} (${j.engine}, ${j.live_metrics} live, ${j.score})`;
    setTimeout(()=>location.reload(),900);
  }catch(e){ st.textContent=t.fail; }
}
document.getElementById("refreshBtn").addEventListener("click",doRefresh);
render();
</script>
</body>
</html>
